apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qf-cp.fullname" . }}
  labels:
    {{- include "qf-cp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "qf-cp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "qf-cp.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: qf-cp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 8443
              protocol: TCP
            - name: enroll
              containerPort: 8444
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "qf-cp.fullname" . }}-secrets
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          volumeMounts:
            - name: pki
              mountPath: /etc/qf/pki
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: pki
          persistentVolumeClaim:
            claimName: {{ if .Values.pki.persistentVolume.existingClaim }}{{ .Values.pki.persistentVolume.existingClaim }}{{ else }}{{ include "qf-cp.fullname" . }}-pki{{ end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
