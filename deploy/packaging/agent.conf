# qf-agent configuration
# Format: KEY=VALUE; blank lines and # comments ignored.
# Environment variables override file values.

# CP gRPC endpoint (host:port)
QF_CP_ENDPOINT=localhost:8443

# Network interface to attach BPF program
QF_IFACE=eth0

# Directory containing agent.crt, agent.key, ca.crt, bundle_signing.pub
QF_PKI_DIR=/etc/qf

# Log level: debug|info|warn|error
QF_LOG_LEVEL=info
