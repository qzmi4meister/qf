version: "2"
sql:
  - engine: postgresql
    queries: internal/store/queries/
    schema: migrations/
    gen:
      go:
        package: storegen
        out: internal/store/gen
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "pg_catalog.inet"
            go_type: "string"
